version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workouts-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workouts
    volumes:
      - workouts-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workouts"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - workouts-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: workouts-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: workouts
      DB_SSLMODE: disable
      DB_SCHEMA: workouts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - workouts-network

volumes:
  workouts-postgres-data:

networks:
  workouts-network:
    driver: bridge
